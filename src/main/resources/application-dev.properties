server.port=8081

# Flyway - mais permissivo em dev
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=false

# JPA - mostrar SQL em dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging em dev
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG

# Token JWT expira em 1 minuto (para testes de refresh no front)
api.security.token.expiration=360000

app.url=https://dev.bellory.com.br

# CONFIGURACAO DE UPLOAD DE ARQUIVOS
file.upload.dir=/var/bellory/dev/uploads
file.upload.base-url=https://api-dev.bellory.com.br/uploads

# PAYMENT API (dev)
payment.api.url=${PAYMENT_API_URL:https://pay-api.bellory.com.br}
payment.api.key=${PAYMENT_API_KEY:pk_F9vtY0M_NVmjV1zLnmD3FBxctdIj9aNCLlv7anMtDQxZEd-npGTmMdz0jSNfOCAu}
payment.api.company-id=${PAYMENT_API_COMPANY_ID:4}

# Redis local (docker)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Healthcheck do Redis desabilitado em dev para evitar spam no log quando Redis nao estiver rodando.
# AssinaturaCacheService ja faz fail-open (cai pra stale ou chama Payment API direto).
management.health.redis.enabled=false
